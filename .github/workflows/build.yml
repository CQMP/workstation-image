name: Build and push workstation image

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'  # Sunday 3am UTC

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: ghcr.io/cqmp/rocky9-workstation:latest
          secrets: |
            ldap_password=${{ secrets.LDAP_BIND_PASSWORD }}
