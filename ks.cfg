# Kickstart for bootc installation on IFT workstations
# Usage: append inst.ks=https://raw.githubusercontent.com/CQMP/workstation-image/main/ks.cfg
#        to the Anaconda boot line on a CentOS Stream 9 boot USB.
#
# NOTE: verify the disk device name before use. Dell workstations with NVMe
# will use nvme0n1; SATA/SAS disks use sda. Adjust --only-use and --ondisk
# below accordingly.

text
reboot

lang en_US.UTF-8
keyboard us
timezone Europe/Warsaw

network --bootproto=dhcp --activate --onboot=yes

# Lock root — access via LDAP accounts and egull SSH key only
rootpw --lock

# Wipe the target disk and partition it
# 50 GB for OS (bootc keeps current + one rollback), rest for /data scratch
ignoredisk --only-use=nvme0n1
clearpart --all --initlabel --drives=nvme0n1
part /boot/efi  --fstype=efi   --size=512    --ondisk=nvme0n1
part /boot      --fstype=ext4  --size=1024   --ondisk=nvme0n1
part /          --fstype=xfs   --size=51200  --ondisk=nvme0n1
part /data      --fstype=xfs   --grow        --ondisk=nvme0n1 --label=data

# Pull and install the OS image from GHCR
ostreecontainer --url ghcr.io/cqmp/rocky9-workstation:latest --transport registry --no-signature-verification
