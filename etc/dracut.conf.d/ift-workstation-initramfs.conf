# Keep the bootc deployment initramfs small enough for GRUB EFI allocation.
# These workstations boot from a local NVMe/XFS root, with no initrd networking,
# encryption, LVM, multipath, RAID, or graphical splash requirement.
omit_dracutmodules+=" i18n plymouth "
omit_dracutmodules+=" network network-manager network-legacy network-wicked ifcfg connman "
omit_dracutmodules+=" cifs nbd nfs nvmf iscsi fcoe fcoe-uefi "
omit_dracutmodules+=" crypt crypt-gpg dm dmraid lvm lvmmerge lvmthinpool-monitor mdraid multipath "
omit_dracutmodules+=" bluetooth qemu qemu-net "
compress="zstd -19 -T0"
