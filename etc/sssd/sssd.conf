[sssd]
config_file_version = 2
services = nss, pam, autofs
domains = fizyk

[nss]

[pam]

[autofs]

[domain/fizyk]
id_provider = ldap
auth_provider = ldap
autofs_provider = ldap

ldap_schema = rfc2307bis
ldap_autofs_search_base = ou=Automount,ou=fizyk,ou=unixAuth,dc=das,dc=fuw,dc=edu,dc=pl

ldap_uri = ldaps://das.fuw.edu.pl/
ldap_search_base = ou=fizyk,ou=unixAuth,dc=das,dc=fuw,dc=edu,dc=pl

# Bind DN and password — request a dedicated proxy account from FUW admins
# (see cn=hprxFizyk1 in fizyk1:/etc/ldap.conf for the naming pattern)
# Temporary: using fizyk1's proxy account until hprxGullZgidWS is provisioned
ldap_default_bind_dn = cn=hprxFizyk1,ou=CC,ou=unixFizyk,ou=proxyAgents,dc=das,dc=fuw,dc=edu,dc=pl
ldap_default_authtok_type = password
ldap_default_authtok = CHANGE_ME

ldap_tls_reqcert = demand

# Allow-list: only these users may log in; add Dominika Zgid (dzgid?) once her
# LDAP account is created by OKWF admins
access_provider = simple
simple_allow_users = egull, rfarid, ajazdzewska, amarie, abalbi

cache_credentials = true
enumerate = false
