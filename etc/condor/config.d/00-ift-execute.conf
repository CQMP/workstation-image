# HTCondor execute node configuration for IFT workstations

CONDOR_HOST = condor.gull-group.org
DAEMON_LIST = MASTER, STARTD

# CCB lets the central manager reach workers that are behind a campus firewall
CCB_ADDRESS = $(CONDOR_HOST)

# CRIU-based transparent process checkpointing
ENABLE_CHECKPOINTING = True

# cuda-checkpoint binary path — HTCondor calls this to suspend/resume GPU state
# around CRIU process snapshots
CUDA_CHECKPOINT = /usr/local/bin/cuda-checkpoint
