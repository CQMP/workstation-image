# HTCondor execute node configuration for IFT workstations

CONDOR_HOST = condor.gull-group.org
DAEMON_LIST = MASTER, STARTD, SCHEDD

# Allow jobs submitted with run_as_owner = true to execute as the submitting
# user rather than as nobody.  Both SCHEDD and STARTER must agree.
# UID_DOMAIN must be identical on all nodes so the startd trusts that the
# user name on the submit host maps to the same uid on the execute host.
SCHEDD_ALLOW_RUNAS_OWNER = true
STARTER_ALLOW_RUNAS_OWNER = true
UID_DOMAIN = ift.local.fuw.edu.pl

# CCB lets the central manager reach workers that are behind a campus firewall
CCB_ADDRESS = $(CONDOR_HOST)

# CRIU-based transparent process checkpointing
ENABLE_CHECKPOINTING = True

# cuda-checkpoint binary path — HTCondor calls this to suspend/resume GPU state
# around CRIU process snapshots
CUDA_CHECKPOINT = /usr/local/bin/cuda-checkpoint

# Owner policy: suspend jobs when keyboard active, evict if user stays active
# SUSPEND/CONTINUE handles brief interruptions (pause/resume without checkpointing)
# PREEMPT triggers only after sustained activity — starts the CRIU checkpoint
START     = (KeyboardIdle > 900) && (LoadAvg < 0.5)
SUSPEND   = (KeyboardIdle < 120)
CONTINUE  = (KeyboardIdle > 600) && (LoadAvg < 0.5)
PREEMPT   = (SUSPEND =?= True) && (KeyboardIdle < 60)
KILL      = False

# Time given to CRIU to complete the GPU+process snapshot before SIGKILL
# MaxJobRetirementTime (= 0, start checkpoint immediately) is set on the central manager
MachineMaxVacateTime = 3600
